<script>

const API = "https://script.google.com/macros/s/AKfycbwWQEBd5VVwjRR5_i8F3dw4tKg-F5kqVYVZ_vbx8e2A8bxja3XIeDnAg2KvkPvaM2uP/exec";

async function send(){

  console.log("click ok");

  const params = new URLSearchParams({
    inDate: document.getElementById("inDate").value,
    expDate: document.getElementById("expDate").value,
    itemNo: document.getElementById("itemNo").value,
    batch: document.getElementById("batch").value,
    qty: document.getElementById("qty").value,
    sample: document.getElementById("sample").value || 0,
    box: document.getElementById("box").value
  });

  try {

    const res = await fetch(API + "?" + params.toString(), {
      method: "GET"
    });

    const text = await res.text();

    document.getElementById("msg").innerText = "✔ " + text;

    // 清空
    ["inDate","expDate","itemNo","batch","qty","sample","box"]
    。forEach(id => document.getElementById(id).value = "");

  } catch (e) {

    console.log(e);
    document.getElementById("msg").innerText = "❌ 連線失敗（GAS沒回應）";
  }
}

</script>
